version: 1
description: Stage-level execution bridge contracts for grounded workflow families.
workflows:
- workflow_id: rnaseq-differential-expression
  default_stages:
    s1:
      bridge_id: manifest-validation
      bridge_type: validation
      execution_mode: local-python
      required_tools: []
      comparator_supported: false
      reproducibility_support: planned
    s4:
      bridge_id: de-statistics
      bridge_type: statistics
      execution_mode: local-python
      required_tools:
      - pydeseq2
      comparator_supported: false
      reproducibility_support: planned
    s5:
      bridge_id: evidence-bundle-assembly
      bridge_type: reporting
      execution_mode: manual-or-agent
      required_tools: []
      comparator_supported: false
      reproducibility_support: planned
    s2:
      bridge_id: generic-rnaseq-alignment-qc
      bridge_type: alignment
      execution_mode: local-or-external
      required_tools:
      - fastqc
      - multiqc
      comparator_supported: false
      reproducibility_support: planned
    s3:
      bridge_id: generic-rnaseq-quantification
      bridge_type: quantification
      execution_mode: local-or-external
      required_tools: []
      comparator_supported: false
      reproducibility_support: planned
  strategies:
    star-featurecounts:
      s2:
        bridge_id: star-alignment-qc
        bridge_type: alignment
        execution_mode: local-cli
        required_tools:
        - fastqc
        - multiqc
        - star
        comparator_supported: false
        reproducibility_support: planned
      s3:
        bridge_id: featurecounts-quantification
        bridge_type: quantification
        execution_mode: local-cli
        required_tools:
        - feature-counts
        comparator_supported: false
        reproducibility_support: planned
    salmon-tximport:
      s2:
        bridge_id: salmon-quant-qc
        bridge_type: quantification
        execution_mode: external-or-manual
        required_tools:
        - salmon
        - fastqc
        - multiqc
        comparator_supported: false
        reproducibility_support: planned
      s3:
        bridge_id: tximport-rollup
        bridge_type: quantification
        execution_mode: local-python
        required_tools:
        - tximport
        comparator_supported: false
        reproducibility_support: planned
