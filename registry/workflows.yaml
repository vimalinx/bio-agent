version: 1
description: Seed workflow registry for the Bio Skill System local project.
workflows:
- id: rnaseq-differential-expression
  layer: workflow
  summary: Bulk RNA-seq differential expression
  request_tags:
  - rnaseq
  - differential-expression
  - bulk-transcriptomics
  - fastq
  - counts-matrix
  stages:
  - input-and-environment-check
  - qc-and-alignment
  - quantification
  - statistical-analysis
  - report-review
  candidate_atomic_skills:
  - fastqc
  - multiqc
  - star
  - feature-counts
  - pydeseq2
  grounding: official-source
  official_sources:
  - label: nf-core/rnaseq
    url: https://nf-co.re/rnaseq
  - label: 'Galaxy Training: RNA-seq analysis and visualization'
    url: https://training.galaxyproject.org/training-material/topics/transcriptomics/tutorials/rna-seq-analysis-clustering-viz/tutorial.html
- id: scrnaseq-preprocessing
  layer: workflow
  summary: Single-cell RNA-seq preprocessing and clustering-ready matrix generation
  grounding: official-source
  official_sources:
  - label: nf-core/scrnaseq
    url: https://nf-co.re/scrnaseq
  - label: 'Galaxy Training: scRNA-seq preprocessing'
    url: https://training.galaxyproject.org/training-material/topics/single-cell/tutorials/scrna-preprocessing/tutorial.html
  - label: 'Galaxy Training: scRNA-seq with Scanpy/Seurat-style downstream'
    url: https://training.galaxyproject.org/training-material/topics/single-cell/tutorials/scrna-seurat-pbmc3k/tutorial.html
  request_tags:
  - scrnaseq
  - single-cell
  - 10x
  - umi
  - cell-barcode
  stages:
  - input-and-reference-check
  - barcode-and-umi-processing
  - count-matrix-generation
  - qc-and-clustering
  - marker-review
  candidate_atomic_skills:
  - starsolo
  - cellranger
  - scanpy
  - scvi-tools
  - multiqc
- id: atacseq-differential-accessibility
