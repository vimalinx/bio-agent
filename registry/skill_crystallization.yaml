version: 1
description: Policies that determine which completed workflow sessions are eligible
  to be crystallized into persistent workflow skills.
policies:
- workflow_id: rnaseq-differential-expression
  allowed_strategy_profiles:
  - star-featurecounts
  require_completed_run: true
  allowed_run_verdicts:
  - ready_to_deliver
  require_no_unresolved_skills: true
